<body>

<!-- Sparkle background -->
<canvas id="sparkle-canvas"></canvas>

<!-- App shell -->
<div id="app">
  <div id="view"></div>
  <nav id="nav">
    <button class="ni" data-p="dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="ni" data-p="notes" onclick="go('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Notes
    </button>
    <button class="ni" data-p="calendar" onclick="go('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </button>
    <button class="ni" data-p="wellness" onclick="go('wellness')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      Bien-être
    </button>
    <button class="ni" data-p="tasks" onclick="go('tasks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="ni-badge" id="task-badge"></span>
      Tâches
    </button>
    <button class="ni" data-p="grades" onclick="go('grades')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      Moyennes
    </button>
    <button class="ni" data-p="luna" onclick="go('luna')" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none" opacity=".3"/></svg>
      <span style="position:absolute;top:2px;right:6px;width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#A78BFA,#C93070);box-shadow:0 0 6px rgba(167,139,250,.8)"></span>
      Luna IA
    </button>
  </nav>
</div>

<!-- Note editor overlay (full-screen) -->
<div id="editor-overlay">
  <div class="ed-hd">
    <button class="ph-back" onclick="exitEditor()">←</button>
    <span class="ed-status" id="ed-st"></span>
    <button id="ed-del" style="color:#E11D48;font-weight:600;font-size:.85rem">Supprimer</button>
  </div>
  <!-- Formatting toolbar -->
  <div class="ed-toolbar" id="ed-toolbar">
    <button class="tb-btn" onclick="fmt('bold')"         title="Gras"><b>B</b></button>
    <button class="tb-btn" onclick="fmt('italic')"       title="Italique"><i>I</i></button>
    <button class="tb-btn" onclick="fmt('underline')"    title="Souligné"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('h2')"      title="Titre">H</button>
    <button class="tb-btn" onclick="fmtBlock('p')"       title="Paragraphe">¶</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('ul')"      title="Liste à puces">• —</button>
    <button class="tb-btn" onclick="fmtBlock('ol')"      title="Liste numérotée">1.</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="insertTable()"       title="Tableau">⊞</button>
    <button class="tb-btn" onclick="insertImage()"       title="Image">🖼</button>
    <button class="tb-btn" onclick="fmtBlock('blockquote')" title="Citation">❝</button>
    <div class="tb-sep"></div>
    <button class="tb-btn tb-highlight-y" onclick="applyHighlight('#FFE066')" title="Surligner jaune">A</button>
    <button class="tb-btn tb-highlight-p" onclick="applyHighlight('#FFB3D9')" title="Surligner rose">A</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="exportNotePDF()" title="Exporter en PDF">PDF</button>
    <input type="file" id="img-file-in" accept="image/*" style="display:none" onchange="handleImageFile(this)">
  </div>
  <div class="ed-body">
    <input id="e-title" type="text" placeholder="Titre…">
    <!-- Tags -->
    <div class="ed-tags-row" id="ed-tags-row">
      <div class="ed-tags-list" id="ed-tags-list"></div>
      <input class="ed-tags-input" id="ed-tags-input" type="text"
        placeholder="#exam #important…"
        onkeydown="handleTagInput(event)"
        autocomplete="off">
    </div>
    <div id="e-content" contenteditable="true" data-placeholder="Commence à écrire…"></div>
  </div>
</div>

<!-- Modal bottom-sheet -->
<div id="modal-wrap">
  <div id="modal-bg" onclick="closeModal()"></div>
  <div id="modal-box"><div id="modal-inner"></div></div>
</div>

<!-- FAB -->
<button id="fab" onclick="openFAB()" aria-label="Ajout rapide">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<script src="js/views/grades.js?v=23"></script>

<!-- ── Tableau : insertion DOM pure (styles garantis) ── -->
<script>
window.addEventListener('load', function() {

  /* ── Ouvre la modale de configuration du tableau ── */
  window.insertTable = function() {
    openModal(`
<div class="modal-body">
  <div class="form-row">
    <div class="form-group" style="flex:1">
      <label class="form-label">Colonnes</label>
      <input class="form-input" id="tbl-cols" type="number" min="1" max="10" value="3" style="width:70px">
    </div>
    <div class="form-group" style="flex:1">
      <label class="form-label">Lignes</label>
      <input class="form-input" id="tbl-rows" type="number" min="1" max="20" value="3" style="width:70px">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group" style="flex:1">
      <label class="form-label">🎨 Fond en-tête</label>
      <input class="form-input" id="tbl-hbg" type="color" value="#C4778E" style="padding:.2rem;height:38px;width:100%">
    </div>
    <div class="form-group" style="flex:1">
      <label class="form-label">🔤 Texte en-tête</label>
      <input class="form-input" id="tbl-htxt" type="color" value="#ffffff" style="padding:.2rem;height:38px;width:100%">
    </div>
  </div>
  <div class="form-row">
    <div class="form-group" style="flex:1">
      <label class="form-label">🎨 Fond cellules</label>
      <input class="form-input" id="tbl-cbg" type="color" value="#ffffff" style="padding:.2rem;height:38px;width:100%">
    </div>
    <div class="form-group" style="flex:1">
      <label class="form-label">🔤 Texte cellules</label>
      <input class="form-input" id="tbl-ctxt" type="color" value="#333333" style="padding:.2rem;height:38px;width:100%">
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Taille du texte</label>
    <select class="setting-select" id="tbl-fsize" style="width:100%">
      <option value="11px">Petit (11px)</option>
      <option value="13px">Normal (13px)</option>
      <option value="15px" selected>Moyen (15px)</option>
      <option value="17px">Grand (17px)</option>
      <option value="20px">Très grand (20px)</option>
    </select>
  </div>
  <div class="modal-actions">
    <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
    <button class="btn" onclick="doInsertTable()">Insérer ✓</button>
  </div>
</div>`, '⊞ Tableau');
  };

  /* ── Construit le tableau via DOM pur → styles GARANTIS ── */
  window.doInsertTable = function() {
    // 1. Lire les valeurs AVANT de fermer la modale
    var rows  = Math.max(1, Math.min(20, parseInt(document.getElementById('tbl-rows').value) || 3));
    var cols  = Math.max(1, Math.min(10, parseInt(document.getElementById('tbl-cols').value) || 3));
    var hBg   = document.getElementById('tbl-hbg').value   || '#C4778E';
    var hTxt  = document.getElementById('tbl-htxt').value  || '#ffffff';
    var cBg   = document.getElementById('tbl-cbg').value   || '#ffffff';
    var cTxt  = document.getElementById('tbl-ctxt').value  || '#333333';
    var fsize = document.getElementById('tbl-fsize').value || '15px';

    closeModal();

    // 2. Insérer après fermeture de la modale (DOM stable)
    setTimeout(function() {
      var el = document.getElementById('e-content');
      if (!el) return;

      // --- Construire le tableau entièrement en DOM ---
      // (jamais de innerHTML : les styles inline sont appliqués DIRECTEMENT)

      var table = document.createElement('table');
      table.style.borderCollapse = 'collapse';
      table.style.width          = '100%';
      table.style.margin         = '10px 0';
      table.style.tableLayout    = 'auto';

      var tbody = document.createElement('tbody');

      for (var r = 0; r < rows; r++) {
        var tr = document.createElement('tr');

        for (var c = 0; c < cols; c++) {
          var isHeader = (r === 0);
          var cell = document.createElement(isHeader ? 'th' : 'td');
          cell.contentEditable = 'true';
          cell.textContent = isHeader ? 'En-tête' : 'Cellule';

          // Appliquer les styles directement sur l'élément DOM
          // → impossible à écraser par une règle CSS de classe
          cell.style.border      = isHeader ? '2px solid #aaa' : '1.5px solid #ccc';
          cell.style.padding     = '8px 12px';
          cell.style.minWidth    = '80px';
          cell.style.fontSize    = fsize;
          cell.style.fontFamily  = 'inherit';
          cell.style.textAlign   = 'left';
          cell.style.verticalAlign = 'top';

          if (isHeader) {
            cell.style.backgroundColor = hBg;
            cell.style.color           = hTxt;
            cell.style.fontWeight      = '700';
          } else {
            cell.style.backgroundColor = cBg;
            cell.style.color           = cTxt;
            cell.style.fontWeight      = 'normal';
          }

          tr.appendChild(cell);
        }
        tbody.appendChild(tr);
      }

      table.appendChild(tbody);

      // Insérer dans l'éditeur
      el.appendChild(document.createElement('br'));
      el.appendChild(table);
      el.appendChild(document.createElement('br'));

      // Focus sur la première cellule
      var firstCell = table.querySelector('th, td');
      if (firstCell) {
        firstCell.focus();
        var range = document.createRange();
        range.selectNodeContents(firstCell);
        range.collapse(false);
        var sel = window.getSelection();
        if (sel) { sel.removeAllRanges(); sel.addRange(range); }
      }

      el.dispatchEvent(new Event('input'));
      el.scrollTop = el.scrollHeight;
    }, 250);
  };

});
</script>
</body>
</html>
