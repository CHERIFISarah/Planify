    </button>
    <button class="ni" data-p="notes" onclick="go('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Notes
    </button>
    <button class="ni" data-p="calendar" onclick="go('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </button>
    <button class="ni" data-p="wellness" onclick="go('wellness')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      Bien-être

    <button class="ni" data-p="tasks" onclick="go('tasks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="ni-badge" id="task-badge"></span>
      Tâches
    </button>
    <button class="ni" data-p="grades" onclick="go('grades')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
      Moyennes
    </button>
    <button class="ni" data-p="luna" onclick="go('luna')" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="3" fill="currentColor" stroke="none" opacity=".3"/></svg>
      <span style="position:absolute;top:2px;right:6px;width:6px;height:6px;border-radius:50%;background:linear-gradient(135deg,#A78BFA,#C93070);box-shadow:0 0 6px rgba(167,139,250,.8)"></span>
      Luna IA
    </button>

</div>

<!-- Note editor overlay (full-screen) -->
<div id="editor-overlay">
  <div class="ed-hd">
    <button class="ph-back" onclick="exitEditor()">←</button>
    <span class="ed-status" id="ed-st"></span>
    <button class="tb-btn" onclick="exportNotePDF()" title="Exporter en PDF" style="font-size:.75rem;padding:.25rem .5rem">PDF</button>
    <button id="ed-del" style="color:#E11D48;font-weight:600;font-size:.85rem">Supprimer</button>
  </div>
  <!-- Formatting toolbar -->
  <div class="ed-toolbar" id="ed-toolbar">
    <button class="tb-btn" onclick="fmt('bold')"         title="Gras"><b>B</b></button>
    <button class="tb-btn" onclick="fmt('italic')"       title="Italique"><i>I</i></button>
    <button class="tb-btn" onclick="fmt('underline')"    title="Souligné"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('h2')"      title="Titre">H</button>
    <button class="tb-btn" onclick="fmtBlock('p')"       title="Paragraphe">¶</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('ul')"      title="Liste à puces">• —</button>
    <button class="tb-btn" onclick="fmtBlock('ol')"      title="Liste numérotée">1.</button>
    <div class="tb-sep"></div>
    <label class="tb-btn tb-color" title="Couleur du texte">
      <span id="tb-color-preview" style="display:inline-block;width:14px;height:3px;background:#C4778E;border-radius:2px;margin-bottom:1px"></span>
      A
      <input type="color" id="tb-color-in" value="#C4778E" style="position:absolute;opacity:0;width:0;height:0"
        oninput="fmtColor(this.value)" onchange="fmtColor(this.value)">
    </label>
    <select class="tb-select" title="Taille du texte" onchange="fmtSize(this.value);this.value=''">
      <option value="" disabled selected>A↕</option>
      <option value="8px">8</option>
      <option value="9px">9</option>
      <option value="10px">10</option>
      <option value="11px">11</option>
      <option value="12px">12</option>
      <option value="14px">14</option>
      <option value="16px">16</option>
      <option value="18px">18</option>
      <option value="20px">20</option>
      <option value="24px">24</option>
      <option value="28px">28</option>
      <option value="32px">32</option>
      <option value="36px">36</option>
      <option value="48px">48</option>
      <option value="72px">72</option>
    </select>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="insertTable()"       title="Tableau">⊞</button>
    <button class="tb-btn" onclick="insertImage()"       title="Image">🖼</button>
    <button class="tb-btn" onclick="fmtBlock('blockquote')" title="Citation">❝</button>
    <div class="tb-sep"></div>
    <button class="tb-btn tb-hl tb-hl-yellow" onclick="fmtHighlight('#FEF08A')" title="Surligner jaune">A</button>
    <button class="tb-btn tb-hl tb-hl-pink"   onclick="fmtHighlight('#FBCFE8')" title="Surligner rose">A</button>
    <button class="tb-btn tb-hl-clear"         onclick="fmtHighlight('transparent')" title="Effacer surlignage">✕</button>
    <input type="file" id="img-file-in" accept="image/*" style="display:none" onchange="handleImageFile(this)">
  </div>
  <div class="ed-body">
    <input id="e-title" type="text" placeholder="Titre…">
    <div id="e-content" contenteditable="true" data-placeholder="Commence à écrire…"></div>
  </div>
</div>

<!-- Modal bottom-sheet -->
<div id="modal-wrap">
  <div id="modal-bg" onclick="closeModal()"></div>
  <div id="modal-box"><div id="modal-inner"></div></div>
</div>

<button id="fab" onclick="openFAB()" aria-label="Ajout rapide">

</button>

<!-- ── Tableau : insertion directe sans modale ── -->
<script>
function insertTable() {
  var el = document.getElementById('e-content');
  if (!el) return;

  // Construire un tableau 3x3 directement en DOM
  var table = document.createElement('table');
  table.style.cssText = 'border-collapse:collapse;width:100%;margin:12px 0;table-layout:auto';

  var tbody = document.createElement('tbody');
  var ROWS = 3, COLS = 3;

  for (var r = 0; r < ROWS; r++) {
    var tr = document.createElement('tr');
    for (var c = 0; c < COLS; c++) {
      var isH = (r === 0);
      var cell = document.createElement(isH ? 'th' : 'td');
      cell.contentEditable = 'true';
      cell.textContent = isH ? 'En-tête' : '';
      cell.style.cssText = [
        'border:' + (isH ? '2px solid #C4778E' : '1.5px solid #ddd'),
        'padding:8px 12px',
        'min-width:80px',
        'font-size:14px',
        'font-family:inherit',
        'text-align:left',
        'vertical-align:top',
        isH ? 'background:#C4778E;color:#fff;font-weight:700' : 'background:#fff;color:#1C0F1A'
      ].join(';');
      tr.appendChild(cell);
    }
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);

  // Insérer à la position du curseur ou à la fin
  el.focus();
  var sel = window.getSelection();
  if (sel && sel.rangeCount > 0) {
    var range = sel.getRangeAt(0);
    // S'assurer qu'on est dans e-content
    if (el.contains(range.commonAncestorContainer)) {
      range.deleteContents();
      range.insertNode(document.createElement('br'));
      range.insertNode(table);
      // Placer le curseur après le tableau
      range.setStartAfter(table);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      el.appendChild(document.createElement('br'));
      el.appendChild(table);
    }
  } else {
    el.appendChild(document.createElement('br'));
    el.appendChild(table);
  }

  el.appendChild(document.createElement('br'));

  // Focus première cellule
  var first = table.querySelector('th');
  if (first) {
    first.focus();
    var r2 = document.createRange();
    r2.selectNodeContents(first);
    r2.collapse(false);
    var s2 = window.getSelection();
    if (s2) { s2.removeAllRanges(); s2.addRange(r2); }
  }

  el.dispatchEvent(new Event('input'));
}
</script>
</body>
</html>
