<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#A0486A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planify">
<!-- Icône iPhone / iPad — PNG obligatoire pour iOS (SVG ignoré) -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="512x512" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="manifest" href="manifest.json">
<!-- Partage social (WhatsApp, Instagram, iMessage…) -->
<meta property="og:title"       content="Planify — Mon Espace Personnel">
<meta property="og:description" content="Notes, agenda, bien-être et tâches — tout pour toi 🌸">
<meta property="og:image"       content="apple-touch-icon.png">
<meta property="og:type"        content="website">
<meta name="twitter:card"       content="summary_large_image">
<meta name="twitter:image"      content="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css?v=12">
<title>Planify ✨</title>
</head>
<body>

<!-- Sparkle background -->
<canvas id="sparkle-canvas"></canvas>

<!-- App shell -->
<div id="app">
  <div id="view"></div>
  <nav id="nav">
    <button class="ni" data-p="dashboard" onclick="go('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Accueil
    </button>
    <button class="ni" data-p="notes" onclick="go('notes')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Notes
    </button>
    <button class="ni" data-p="calendar" onclick="go('calendar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Agenda
    </button>
    <button class="ni" data-p="wellness" onclick="go('wellness')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      Bien-être
    </button>
    <button class="ni" data-p="tasks" onclick="go('tasks')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      <span class="ni-badge" id="task-badge"></span>
      Tâches
    </button>
  </nav>
</div>

<!-- Note editor overlay (full-screen) -->
<div id="editor-overlay">
  <div class="ed-hd">
    <button class="ph-back" onclick="exitEditor()">←</button>
    <span class="ed-status" id="ed-st"></span>
    <button id="ed-del" style="color:#E11D48;font-weight:600;font-size:.85rem">Supprimer</button>
  </div>
  <!-- Formatting toolbar -->
  <div class="ed-toolbar" id="ed-toolbar">
    <button class="tb-btn" onclick="fmt('bold')"         title="Gras"><b>B</b></button>
    <button class="tb-btn" onclick="fmt('italic')"       title="Italique"><i>I</i></button>
    <button class="tb-btn" onclick="fmt('underline')"    title="Souligné"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('h2')"      title="Titre">H</button>
    <button class="tb-btn" onclick="fmtBlock('p')"       title="Paragraphe">¶</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="fmtBlock('ul')"      title="Liste à puces">• —</button>
    <button class="tb-btn" onclick="fmtBlock('ol')"      title="Liste numérotée">1.</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" onclick="insertTable()"       title="Tableau">⊞</button>
    <button class="tb-btn" onclick="insertImage()"       title="Image">🖼</button>
    <button class="tb-btn" onclick="fmtBlock('blockquote')" title="Citation">❝</button>
    <input type="file" id="img-file-in" accept="image/*" style="display:none" onchange="handleImageFile(this)">
  </div>
  <div class="ed-body">
    <input id="e-title" type="text" placeholder="Titre…">
    <div id="e-content" contenteditable="true" data-placeholder="Commence à écrire…"></div>
  </div>
</div>

<!-- Modal bottom-sheet -->
<div id="modal-wrap">
  <div id="modal-bg" onclick="closeModal()"></div>
  <div id="modal-box"><div id="modal-inner"></div></div>
</div>

<!-- FAB -->
<button id="fab" onclick="openFAB()" aria-label="Ajout rapide">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- Scripts — order matters -->
<script src="js/data.js?v=10"></script>
<script src="js/firebase-config.js?v=10"></script>
<script src="js/views/dashboard.js?v=10"></script>
<script src="js/views/notes.js?v=10"></script>
<script src="js/views/calendar.js?v=10"></script>
<script src="js/views/wellness.js?v=10"></script>
<script src="js/views/tasks.js?v=10"></script>
<script src="js/views/settings.js?v=12"></script>
<script src="js/app.js?v=13"></script>
</body>
</html>
